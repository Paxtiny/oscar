<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="oscar app icon">
  <title>oscar app icon</title>
  <defs>
    <filter id="hex-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0 0 0 0 0.655
                0 0 0 0 0.545
                0 0 0 0 0.98
                0 0 0 0.6 0" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="text-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0 0 0 0 0.29
                0 0 0 0 0.855
                0 0 0 0 0.502
                0 0 0 0.7 0" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="#0b0b10"/>

  <!-- Hexagon centered at (256, 240) -->
  <g transform="translate(256,240)">
    <!-- Glow stroke -->
    <polygon points="0,-120 104,-60 104,60 0,120 -104,60 -104,-60"
             fill="none" stroke="#a78bfa" stroke-width="12" stroke-linejoin="round"
             filter="url(#hex-glow)" opacity="0.7"/>
    <!-- Dark fill -->
    <polygon points="0,-120 104,-60 104,60 0,120 -104,60 -104,-60"
             fill="#0b0b10"/>
    <!-- Primary border -->
    <polygon points="0,-120 104,-60 104,60 0,120 -104,60 -104,-60"
             fill="none" stroke="#7c3aed" stroke-width="7" stroke-linejoin="round"/>
    <!-- Lighter outer stroke -->
    <polygon points="0,-120 104,-60 104,60 0,120 -104,60 -104,-60"
             fill="none" stroke="#a78bfa" stroke-width="3" stroke-linejoin="round" opacity="0.4"/>

    <!-- White "n" -->
    <text x="0" y="30"
          text-anchor="middle"
          font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif"
          font-size="150"
          font-weight="800"
          fill="#ffffff">n</text>

    <!--
      "oscar" sitting ON the 5 o'clock bar, horizontal
      Edge at x=72 is at y~78. Text top aligns with edge, body hangs below.
      Shifted right from midpoint to match Stitch first draft positioning.
    -->
    <text x="72" y="88"
          text-anchor="middle"
          font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif"
          font-size="30"
          font-weight="800"
          letter-spacing="1.5"
          fill="#4ade80"
          filter="url(#text-glow)">oscar</text>
  </g>
</svg>
