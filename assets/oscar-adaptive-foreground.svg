<svg xmlns="http://www.w3.org/2000/svg" width="108" height="108" viewBox="0 0 108 108" role="img" aria-label="oscar adaptive icon foreground">
  <title>oscar adaptive icon foreground</title>
  <!--
    Android Adaptive Icon Foreground Layer
    108x108dp total, 72x72dp safe zone (centered, 18dp inset on each side)
    The hexagon + n must fit within the 72x72 safe zone.
  -->
  <defs>
    <filter id="glow" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0 0 0 0 0.655
                0 0 0 0 0.545
                0 0 0 0 0.98
                0 0 0 0.4 0" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Hexagon centered at 54,48 (shifted up slightly to make room for oscar text) -->
  <g transform="translate(54,46)">
    <!-- Glow -->
    <polygon points="0,-26 22.5,-13 22.5,13 0,26 -22.5,13 -22.5,-13"
             fill="none" stroke="#a78bfa" stroke-width="2.5" stroke-linejoin="round"
             filter="url(#glow)" opacity="0.6"/>
    <!-- Fill -->
    <polygon points="0,-26 22.5,-13 22.5,13 0,26 -22.5,13 -22.5,-13"
             fill="#0b0b10"/>
    <!-- Border -->
    <polygon points="0,-26 22.5,-13 22.5,13 0,26 -22.5,13 -22.5,-13"
             fill="none" stroke="#7c3aed" stroke-width="1.5" stroke-linejoin="round"/>

    <!-- White "n" -->
    <text x="0" y="7"
          text-anchor="middle"
          font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif"
          font-size="32"
          font-weight="800"
          fill="#ffffff">n</text>
  </g>

  <!-- "oscar" in neon green below hexagon -->
  <text x="54" y="82"
        text-anchor="middle"
        font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif"
        font-size="11"
        font-weight="700"
        letter-spacing="0.5"
        fill="#4ade80">oscar</text>
</svg>
