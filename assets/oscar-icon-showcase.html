<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .tech-font { font-family: 'JetBrains+Mono', monospace; }
        .glow-purple { filter: drop-shadow(0 0 10px rgba(124, 58, 237, 0.6)); }
    </style>
</head>
<body class="bg-[#0f0d13] text-white min-h-screen flex flex-col items-center justify-center p-8">

    <!-- Header / Context -->
    <div class="mb-12 text-center">
        <h1 class="text-2xl font-black tracking-tight mb-2">oscar App Icon</h1>
        <p class="text-slate-400 text-sm">Visualizing scaling and legibility across sizes</p>
    </div>

    <!-- Main Showcase -->
    <div class="flex flex-col md:flex-row items-end justify-center gap-16 mb-20">

        <!-- Large Variant (512px) -->
        <div class="flex flex-col items-center gap-4">
            <div class="relative w-[512px] h-[512px] flex items-center justify-center">
                <img src="{{DATA:IMAGE:IMAGE_72}}" alt="oscar Icon 512px" class="w-full h-full object-contain rounded-3xl shadow-2xl">
            </div>
            <span class="text-xs font-mono text-slate-500 uppercase tracking-widest">512px (High Res)</span>
        </div>

        <!-- Medium Variant (192px) -->
        <div class="flex flex-col items-center gap-4">
            <div class="relative w-[192px] h-[192px] flex items-center justify-center">
                <img src="{{DATA:IMAGE:IMAGE_72}}" alt="oscar Icon 192px" class="w-full h-full object-contain rounded-2xl shadow-xl">
            </div>
            <span class="text-xs font-mono text-slate-500 uppercase tracking-widest">192px (Launcher)</span>
        </div>

        <!-- Small Variant (48px) -->
        <div class="flex flex-col items-center gap-4">
            <div class="relative w-[48px] h-[48px] flex items-center justify-center">
                <img src="{{DATA:IMAGE:IMAGE_72}}" alt="oscar Icon 48px" class="w-full h-full object-contain rounded-lg shadow-md">
            </div>
            <span class="text-xs font-mono text-slate-500 uppercase tracking-widest">48px (Micro)</span>
        </div>

    </div>

    <!-- Footer Specs -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-8 max-w-2xl w-full border-t border-slate-800 pt-8">
        <div>
            <p class="text-[10px] text-slate-500 uppercase font-bold mb-1">Primary Color</p>
            <div class="flex items-center gap-2">
                <div class="w-4 h-4 rounded bg-[#7C3AED]"></div>
                <span class="text-xs font-mono">#7C3AED</span>
            </div>
        </div>
        <div>
            <p class="text-[10px] text-slate-500 uppercase font-bold mb-1">Accent Color</p>
            <div class="flex items-center gap-2">
                <div class="w-4 h-4 rounded bg-[#4ade80]"></div>
                <span class="text-xs font-mono">#4ade80</span>
            </div>
        </div>
        <div>
            <p class="text-[10px] text-slate-500 uppercase font-bold mb-1">Dark Fill</p>
            <div class="flex items-center gap-2">
                <div class="w-4 h-4 rounded bg-[#0b0b10]"></div>
                <span class="text-xs font-mono">#0b0b10</span>
            </div>
        </div>
        <div>
            <p class="text-[10px] text-slate-500 uppercase font-bold mb-1">Glow</p>
            <div class="flex items-center gap-2">
                <div class="w-4 h-4 rounded bg-[#a78bfa]"></div>
                <span class="text-xs font-mono">#a78bfa</span>
            </div>
        </div>
    </div>

</body>
</html>
