name: CI (Self-Hosted)

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  OSCAR_TEST_URL: http://localhost:8081

jobs:
  backend-tests:
    runs-on: [self-hosted, tower]
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: oscar_test
          POSTGRES_USER: oscar
          POSTGRES_PASSWORD: oscar_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Go vet
        run: go vet ./...

      - name: Go tests (JUnit XML)
        run: |
          go install gotest.tools/gotestsum@latest
          gotestsum --junitfile test-results/go.xml -- ./... -v

      - name: Upload Go test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: go-test-results-${{ github.run_id }}
          path: test-results/go.xml
          retention-days: 30

  e2e-encryption:
    runs-on: [self-hosted, tower]
    needs: [backend-tests]
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: oscar_test
          POSTGRES_USER: oscar
          POSTGRES_PASSWORD: oscar_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      # Checkout nicodaimus-crypto and symlink to expected location
      - uses: actions/checkout@v4
        with:
          repository: Paxtiny/nicodaimus-crypto
          path: nicodaimus-crypto

      - name: Symlink nicodaimus-crypto to parent dir (matches file:../nicodaimus-crypto)
        run: ln -sf "$GITHUB_WORKSPACE/nicodaimus-crypto" ../nicodaimus-crypto

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      # Build and run Go backend natively (not Docker - avoids crypto dep issue)
      - name: Build oscar backend
        run: CGO_ENABLED=1 go build -o oscar-server .

      - name: Start oscar backend
        run: |
          mkdir -p storage
          ./oscar-server server run > /tmp/oscar-backend.log 2>&1 &
          echo "Waiting for oscar backend..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/api/v1/tokens/list.json > /dev/null 2>&1; then
              echo "Backend is ready"
              break
            fi
            sleep 2
          done
          # Verify registration is enabled
          curl -s http://localhost:8080/api/v1/server/settings.json | head -c 200
        env:
          # Env vars follow OSCAR_<SECTION>_<KEY> pattern
          OSCAR_DATABASE_TYPE: postgres
          OSCAR_DATABASE_HOST: "localhost:5432"
          OSCAR_DATABASE_NAME: oscar_test
          OSCAR_DATABASE_USER: oscar
          OSCAR_DATABASE_PASSWD: oscar_test
          OSCAR_DATABASE_SSL_MODE: disable
          OSCAR_SERVER_PROTOCOL: http
          OSCAR_SERVER_HTTP_PORT: "8080"
          OSCAR_USER_ENABLE_REGISTER: "true"
          OSCAR_SECURITY_SECRET_KEY: e2e-test-secret-key-not-for-production

      - name: Start frontend dev server
        run: |
          npm run serve &
          for i in $(seq 1 20); do
            if curl -sf http://localhost:8081 > /dev/null 2>&1; then
              echo "Frontend dev server is ready"
              break
            fi
            sleep 2
          done

      - name: Run Playwright encryption E2E tests
        run: npx playwright test --reporter=list,junit
        env:
          OSCAR_TEST_URL: http://localhost:8081
          PLAYWRIGHT_JUNIT_OUTPUT_FILE: test-results/playwright.xml

      - name: Save test results to Tower host for debugging
        if: always()
        run: |
          mkdir -p /opt/test-results/${{ github.run_id }}
          cp -r test-results/ /opt/test-results/${{ github.run_id }}/ 2>/dev/null || true

      - name: Upload Playwright results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-test-results-${{ github.run_id }}
          path: test-results/
          retention-days: 30

      - name: Upload screenshots on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: e2e-screenshots-${{ github.run_id }}
          path: test-results/**/*.png
          retention-days: 7

      - name: Dump backend logs on failure
        if: failure()
        run: |
          echo "=== Oscar Backend Logs ==="
          cat /tmp/oscar-backend.log 2>/dev/null | tail -100 || echo "No backend logs"
          mkdir -p /opt/test-results/${{ github.run_id }}
          cp /tmp/oscar-backend.log /opt/test-results/${{ github.run_id }}/backend.log 2>/dev/null || true

      - name: Cleanup backend
        if: always()
        run: pkill -f oscar-server || true

  notify:
    runs-on: [self-hosted, tower]
    needs: [backend-tests, e2e-encryption]
    if: failure()
    steps:
      - name: Notify Telegram
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TG_CHAT_ID }}&text=CI failed: ${{ github.workflow }} - ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
