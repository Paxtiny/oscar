[global]
mode = development

[server]
protocol = http
http_addr = 0.0.0.0
http_port = 18080
domain = localhost
root_url = %(protocol)s://%(domain)s:%(http_port)s/
static_root_path = public
enable_gzip = false
log_request = true

[database]
type = sqlite3
db_path = data/oscar.db
auto_update_database = true

[log]
mode = console
level = debug

[security]
secret_key = oscar-dev-secret-key-change-me

[auth]
enable_internal_auth = true

[user]
enable_register = true

[llm]
transaction_from_ai_image_recognition = false
